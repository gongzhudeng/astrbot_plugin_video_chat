name: astrbot_plugin_video_chat
display_name: 灵犀 · 视频链接理解
author: 灵犀
desc: 发送视频链接，AI 自动理解视频内容，支持抖音（视频/图文）、B站（含字幕提取）
version: v1.1.0
repo: https://github.com/gongzhudeng/astrbot_plugin_video_chat
help: |
  发送包含视频链接的消息，AI 会自动判断是否需要解析视频内容。

  支持平台：
  - 抖音：视频（v.douyin.com 短链 / 完整链接）、图文帖（/share/note/）
  - B 站：BV号/av号/短链（b23.tv）/完整链接，可配置 SESSDATA 启用字幕提取

  工作方式：
  1. 发送包含视频链接的消息（或说"帮我看看这个 xxx"）
  2. AI 自动调用视频解析工具
  3. 解析完成后，AI 基于视频内容回答

  注意：
  - 需配置支持视频/图片输入的视觉模型（如 Qwen-VL、Gemini、Kimi 等）
  - 支持 video_url 的模型优先直传 URL，不在本地保存任何文件
  - 只支持图片的模型需开启 allow_local_download，临时下载后抽帧，处理完自动删除
  - B 站视频可配置 SESSDATA 启用字幕优先模式