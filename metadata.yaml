name: astrbot_plugin_video_chat
display_name: 灵犀 · 视频理解
author: 灵犀
desc: 自动理解直发视频与抖音/B站链接，支持字幕/语音、高赞评论回复和视频上下文限额
version: v2.3.1
repo: https://github.com/gongzhudeng/astrbot_plugin_video_chat
help: |
  发送直发视频或明确的视频链接，AI 会自动解析并根据当前问题回答。

  支持输入：
  - 直发视频：自动抽帧，可选 STT；引用时复用历史，不重复解析
  - 抖音：视频、图文/动图帖、作品信息、高赞评论与回复
  - B 站：BV号/av号/b23.tv/完整链接、字幕、高赞评论与回复
  - 不读取弹幕，不支持小红书

  解析规则：
  - B 站字幕优先；无字幕时才分析画面并按配置执行 STT
  - 评论按点赞排序，总预算包含一级评论、回复和评论图片描述
  - 评论图片分析默认关闭；开启后批量处理，动图或短视频媒体只取一帧
  - 视觉模型和 STT 均支持一个兜底 Provider
  - 视频上下文默认只保留最新 3 个完整解析详情，旧详情替换为轻量标记

  注意：
  - 抖音 video_url 直传可能由多模态模型读取完整视频和音轨，不受本地抽帧时长限制
  - 关闭 STT 后不输出独立语音原文，但原生视频模型仍可能理解音轨
  - 评论接口失败只省略评论，不影响作品主体解析
